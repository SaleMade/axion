# ════════════════════════════════════════════════════════════════
# AXION — Cloudflare Worker (API multi-usuário)
# ════════════════════════════════════════════════════════════════
name = "axion-api"
main = "worker.js"
compatibility_date = "2026-01-01"
workers_dev = true   # mantem a URL axion-api.axion-dash.workers.dev viva (a dash usa ela)

# ─── Domínios custom pras pressels (TikTok com domínios diferentes) ──
# Cada domínio serve o Worker; a pressel fica em https://dominio/p/<id>.
# (Já anexados via API; aqui ficam declarados pra não sumirem em deploy.)
routes = [
  { pattern = "area-acesso.com", custom_domain = true },
  { pattern = "area-glico.fun", custom_domain = true },
  { pattern = "painel-glico.fun", custom_domain = true }
]

# ─── Cron: sincroniza o estado de conexão (wa_conn) com a Evolution a cada 2min ──
# (mantém "conectado/número" certo mesmo com a dash fechada — serve-time confia no wa_conn)
[triggers]
crons = ["*/2 * * * *"]

# ─── D1 (SQLite gerenciado) ────────────────────────────────────
# Após `wrangler d1 create axion`, copie o `database_id` exibido
# e cole abaixo (substitui REPLACE-ME).
[[d1_databases]]
binding       = "DB"
database_name = "axion"
database_id   = "a21e7bc2-98fe-4811-b6b0-b016e10a5137"

# ─── R2 (mídia do Sale Chat: áudios/vídeos/imagens que o Diretor sobe) ──
[[r2_buckets]]
binding     = "MEDIA"
bucket_name = "salechat-media"

# ─── Observabilidade ───────────────────────────────────────────
[observability]
enabled = true
